openapi: 3.0.3
info:
  title: Clinic Appointment Scheduling API Gateway
  version: 1.0.0
  description: Tài liệu hệ thống phòng khám đồng bộ chuẩn xác 100% theo mã nguồn định tuyến thực tế.

servers:
  - url: http://localhost:5000
    description: Development Server (Cục bộ)

# 🛡️ CẤU HÌNH HỆ THỐNG Ổ KHÓA BẢO MẬT Bearer Token
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  # ==========================================
  # 🔐 PHÂN HỆ: AUTHENTICATION & USERS (Khớp 100% Code của bạn)
  # ==========================================
  /api/users/register:
    post:
      summary: Đăng ký tài khoản người dùng mới
      tags: [Authentication & Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, phone]
              properties:
                name: {type: string, example: "Nguyễn Văn A"}
                email: {type: string, example: "nguyenvana@gmail.com"}
                password: {type: string, example: "Password123!"}
                phone: {type: string, example: "0901234567"}
      responses:
        201:
          description: Đăng ký thành công tài khoản.

  /api/users/login:
    post:
      summary: Đăng nhập hệ thống để nhận Access Token
      tags: [Authentication & Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, example: "nguyenvana@gmail.com"}
                password: {type: string, example: "Password123!"}
      responses:
        200:
          description: Đăng nhập thành công, trả về JWT Token.

  /api/users/update-user/{id}:
    put:
      summary: Cập nhật thông tin tài khoản (Yêu cầu Đăng nhập)
      tags: [Authentication & Users]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Mã ID người dùng cần cập nhật
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string, example: "Nguyễn Văn A Sửa Đổi"}
                phone: {type: string, example: "0987654321"}
      responses:
        200:
          description: Cập nhật thành công.

  /api/users/delete/{id}:
    delete:
      summary: Xóa tài khoản người dùng (Chỉ Admin)
      tags: [Authentication & Users]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Mã ID người dùng cần xóa
      responses:
        200:
          description: Xóa tài khoản thành công.

  /api/users/get-detail-user/{id}:
    get:
      summary: Lấy chi tiết thông tin của một người dùng
      tags: [Authentication & Users]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Trả về dữ liệu chi tiết người dùng.

  /api/users/getall:
    get:
      summary: Lấy toàn bộ danh sách người dùng trong hệ thống (Chỉ Admin)
      tags: [Authentication & Users]
      security:
        - BearerAuth: []
      responses:
        200:
          description: Trả về danh sách mảng dữ liệu tất cả user.

  # ==========================================
  # 📅 PHÂN HỆ: APPOINTMENTS (QUẢN LÝ LỊCH HẸN)
  # ==========================================
  /api/appointments/create:
    post:
      summary: Đặt lịch khám bệnh mới
      tags: [Appointments]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doctorId, serviceId, appointmentDate, startTime]
              properties:
                doctorId: {type: string, example: "64bbf123c9e1234567890abc"}
                serviceId: {type: string, example: "64bbf456c9e1234567890def"}
                appointmentDate: {type: string, format: date, example: "2026-07-20"}
                startTime: {type: string, example: "09:00"}
      responses:
        201:
          description: Đặt lịch thành công.

  /api/appointments/status/{id}:
    patch:
      summary: Cập nhật trạng thái lịch hẹn
      tags: [Appointments]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: {type: string, enum: [pending, confirmed, cancelled, completed], example: "confirmed"}
      responses:
        200:
          description: Trạng thái đã được cập nhật thành công.

  /api/appointments/history-patient:
    get:
      summary: Lấy lịch sử khám bệnh của Bệnh nhân
      tags: [Appointments]
      security:
        - BearerAuth: []
      responses:
        200:
          description: Trả về mảng lịch sử đặt lịch.

  /api/appointments/schedule-doctor:
    get:
      summary: Lấy danh sách ca khám của Bác sĩ
      tags: [Appointments]
      security:
        - BearerAuth: []
      responses:
        200:
          description: Trả về lịch làm việc của bác sĩ.

  # ==========================================
  # 🩺 PHÂN HỆ KHÁC (BÁC SĨ, DỊCH VŨ, ĐÁNH GIÁ, THÔNG BÁO)
  # ==========================================
  /api/doctors:
    get:
      summary: Lấy danh sách toàn bộ bác sĩ
      tags: [Doctor Profiles]
      responses:
        200:
          description: Thành công.

  /api/services:
    get:
      summary: Xem danh mục gói dịch vụ y tế & bảng giá
      tags: [Clinic Services]
      responses:
        200:
          description: Thành công.

  /api/reviews/create:
    post:
      summary: Viết đánh giá chất lượng sau khi khám
      tags: [Reviews & Feedbacks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content: